<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeePass Web Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
  :root{--bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--border:#2a3347;--accent:#4e9eff;--accent2:#3d7fd4;--green:#3dd68c;--red:#ff5f57;--yellow:#f5a623;--text:#e2e8f0;--text2:#8899aa;--text3:#4a5568;--mono:"IBM Plex Mono",monospace;--sans:"IBM Plex Sans",sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:12px;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:100}
  .logo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  header h1{font-size:15px;font-weight:600;letter-spacing:.02em;color:var(--text)}
  header small{font-size:11px;color:var(--text2);font-family:var(--mono);margin-left:auto;background:var(--bg3);padding:3px 8px;border-radius:4px;border:1px solid var(--border)}
  .security-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green);background:rgba(61,214,140,.08);border:1px solid rgba(61,214,140,.2);padding:3px 8px;border-radius:4px}
  .app{display:flex;flex:1;overflow:hidden;height:calc(100vh - 57px)}
  #unlock-screen{display:flex;align-items:center;justify-content:center;flex:1;padding:40px}
  .unlock-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .unlock-card h2{font-size:20px;font-weight:600;margin-bottom:6px}
  .unlock-card p{font-size:13px;color:var(--text2);margin-bottom:28px;line-height:1.6}
  .drop-zone{border:2px dashed var(--border);border-radius:10px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:20px;position:relative}
  .drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:rgba(78,158,255,.05)}
  .drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .drop-zone .icon{font-size:28px;margin-bottom:8px}
  .drop-zone p{color:var(--text2);font-size:13px;margin:0}
  .drop-zone .filename{color:var(--accent);font-family:var(--mono);font-size:12px;margin-top:6px}
  .field-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em}
  .field-row{position:relative;margin-bottom:16px}
  .field-row input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 40px 10px 12px;color:var(--text);font-family:var(--mono);font-size:14px;outline:none;transition:border-color .2s}
  .field-row input:focus{border-color:var(--accent)}
  .field-row .toggle-pw{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text2);font-size:16px;padding:4px;line-height:1}
  .field-row .toggle-pw:hover{color:var(--text)}
  .btn-unlock{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s,transform .1s;font-family:var(--sans);margin-top:4px}
  .btn-unlock:hover{background:var(--accent2)}
  .btn-unlock:active{transform:scale(.98)}
  .btn-unlock:disabled{opacity:.5;cursor:not-allowed}
  .error-msg{background:rgba(255,95,87,.1);border:1px solid rgba(255,95,87,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-top:14px;display:none}
  #sidebar{width:240px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .sidebar-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .sidebar-header span{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em}
  .btn-lock{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:11px;padding:3px 8px;cursor:pointer;font-family:var(--sans);transition:all .2s}
  .btn-lock:hover{border-color:var(--red);color:var(--red)}
  #group-tree{flex:1;overflow-y:auto;padding:8px 0}
  .group-item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;border-left:2px solid transparent}
  .group-item:hover{background:var(--bg3);color:var(--text)}
  .group-item.active{background:rgba(78,158,255,.1);color:var(--accent);border-left-color:var(--accent)}
  .group-item .count{margin-left:auto;font-size:11px;font-family:var(--mono);background:var(--bg3);padding:1px 5px;border-radius:3px}
  .group-item.active .count{background:rgba(78,158,255,.2)}
  #entry-list-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border);min-width:280px;max-width:380px}
  .search-bar{padding:12px;border-bottom:1px solid var(--border);background:var(--bg2)}
  .search-bar input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;transition:border-color .2s;font-family:var(--sans)}
  .search-bar input:focus{border-color:var(--accent)}
  .search-bar input::placeholder{color:var(--text3)}
  #entry-list{flex:1;overflow-y:auto}
  .entry-item{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
  .entry-item:hover{background:var(--bg2)}
  .entry-item.active{background:rgba(78,158,255,.08)}
  .entry-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:8px}
  .entry-icon{font-size:14px;flex-shrink:0}
  .entry-url{font-size:11px;color:var(--text3);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--text3);font-size:13px;gap:8px}
  .empty-state .big{font-size:32px}
  #entry-detail{flex:1;overflow-y:auto;padding:24px;background:var(--bg)}
  .detail-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:12px;font-size:14px}
  .detail-placeholder .big{font-size:48px}
  .detail-title{font-size:20px;font-weight:600;margin-bottom:6px}
  .detail-group-tag{font-size:11px;color:var(--text2);background:var(--bg3);padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:24px;font-family:var(--mono)}
  .field-block{margin-bottom:16px}
  .field-block .label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-bottom:6px}
  .field-value-row{display:flex;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;gap:8px;font-family:var(--mono);font-size:13px;min-height:42px}
  .field-value-row .val{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
  .field-value-row .val.masked{letter-spacing:.15em}
  .field-value-row a{color:var(--accent);text-decoration:none}
  .field-value-row a:hover{text-decoration:underline}
  .btn-icon{background:none;border:none;cursor:pointer;color:var(--text2);font-size:14px;padding:4px;border-radius:4px;transition:all .15s;line-height:1;flex-shrink:0}
  .btn-icon:hover{background:var(--bg3);color:var(--text)}
  .notes-block{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:13px;color:var(--text2);white-space:pre-wrap;line-height:1.6;font-family:var(--mono);max-height:200px;overflow-y:auto}
  .copy-toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#0f1117;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;transform:translateY(10px);transition:all .2s;pointer-events:none;z-index:999}
  .copy-toast.show{opacity:1;transform:translateY(0)}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--text3)}
  .loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
  .hidden{display:none!important}

  /* ===== NEW: Action buttons in entry list header ===== */
  .entry-list-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg2);gap:8px}
  .btn-add-entry{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:background .2s;white-space:nowrap}
  .btn-add-entry:hover{background:var(--accent2)}
  .btn-save-db{background:var(--green);color:#0f1117;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:opacity .2s;white-space:nowrap}
  .btn-save-db:hover{opacity:.85}
  .btn-save-db:disabled{opacity:.4;cursor:not-allowed}

  /* ===== NEW: Detail action buttons ===== */
  .detail-actions{display:flex;gap:8px;margin-bottom:20px}
  .btn-edit-entry{background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:var(--sans);transition:all .15s}
  .btn-edit-entry:hover{border-color:var(--accent);color:var(--accent)}
  .btn-delete-entry{background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:var(--sans);transition:all .15s}
  .btn-delete-entry:hover{border-color:var(--red);color:var(--red)}

  /* ===== NEW: Modal ===== */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.hidden{display:none!important}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.5)}
  .modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .modal-header h3{font-size:16px;font-weight:600}
  .modal-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px;line-height:1;border-radius:4px}
  .modal-close:hover{background:var(--bg3);color:var(--text)}
  .modal-body{padding:20px 24px}
  .modal-field{margin-bottom:18px}
  .modal-field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-bottom:6px}
  .modal-field input,.modal-field textarea,.modal-field select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .2s}
  .modal-field input:focus,.modal-field textarea:focus,.modal-field select:focus{border-color:var(--accent)}
  .modal-field textarea{resize:vertical;min-height:80px;line-height:1.5}
  .modal-field select option{background:var(--bg3)}
  .pw-field-row{position:relative}
  .pw-field-row input{padding-right:80px}
  .pw-actions{position:absolute;right:8px;top:50%;transform:translateY(-50%);display:flex;gap:4px}
  .pw-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:13px;padding:3px 6px;border-radius:4px;line-height:1;font-family:var(--sans)}
  .pw-btn:hover{background:var(--border);color:var(--text)}
  .pw-strength{height:3px;border-radius:2px;margin-top:6px;transition:all .3s}
  .modal-footer{padding:16px 24px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
  .btn-cancel{background:none;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;font-family:var(--sans);transition:all .2s}
  .btn-cancel:hover{border-color:var(--text2);color:var(--text)}
  .btn-save{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:background .2s}
  .btn-save:hover{background:var(--accent2)}

  /* ===== NEW: Confirm dialog ===== */
  .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px}
  .confirm-overlay.hidden{display:none!important}
  .confirm-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:28px;max-width:360px;width:100%;box-shadow:0 16px 60px rgba(0,0,0,.5);text-align:center}
  .confirm-box h4{font-size:16px;font-weight:600;margin-bottom:10px}
  .confirm-box p{font-size:13px;color:var(--text2);margin-bottom:24px;line-height:1.6}
  .confirm-btns{display:flex;gap:10px;justify-content:center}
  .btn-confirm-cancel{background:none;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer;font-family:var(--sans)}
  .btn-confirm-ok{background:var(--red);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans)}
  .btn-confirm-ok:hover{opacity:.85}

  /* ===== NEW: Unsaved indicator ===== */
  .unsaved-dot{width:7px;height:7px;background:var(--yellow);border-radius:50%;display:inline-block;margin-left:6px}

  @media(max-width:700px){
    #sidebar{display:none}
    #entry-list-pane{min-width:100%;max-width:100%}
    #entry-detail{display:none}
    .app{flex-direction:column}
  }
</style>
</head>
<body>

<header>
  <div class="logo">🔐</div>
  <h1>KeePass Web Editor</h1>
  <div class="security-badge">🛡 本地解密，零資料上傳</div>
  <small>支援 KeePass 2.x (.kdbx)</small>
</header>

<div id="unlock-screen">
  <div class="unlock-card">
    <h2>開啟密碼庫</h2>
    <p>選擇你的 .kdbx 檔案並輸入主密碼。所有解密均在瀏覽器本地完成，密碼不會離開你的裝置。</p>
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".kdbx">
      <div class="icon">📁</div>
      <p>拖放 .kdbx 檔案或點擊選擇</p>
      <div class="filename" id="filename-display"></div>
    </div>
    <div class="field-label">主密碼</div>
    <div class="field-row">
      <input type="password" id="master-pw" placeholder="輸入主密碼..." autocomplete="off">
      <button class="toggle-pw" onclick="togglePw()">👁</button>
    </div>
    <button class="btn-unlock" id="unlock-btn" onclick="unlockDB()">解鎖密碼庫</button>
    <div class="error-msg" id="error-msg"></div>
  </div>
</div>

<div class="app hidden" id="main-app">
  <div id="sidebar">
    <div class="sidebar-header">
      <span>群組</span>
      <button class="btn-lock" onclick="lockDB()">🔒 鎖定</button>
    </div>
    <div id="group-tree"></div>
  </div>
  <div id="entry-list-pane">
    <div class="entry-list-header">
      <div class="search-bar" style="padding:0;flex:1;background:transparent;border:none">
        <input type="text" id="search-input" placeholder="搜尋帳號..." oninput="filterEntries(this.value)" style="border-radius:6px">
      </div>
      <button class="btn-add-entry" onclick="openModal(null)">＋ 新增</button>
      <button class="btn-save-db" id="save-db-btn" onclick="saveDB()" disabled>💾 儲存</button>
    </div>
    <div id="entry-list">
      <div class="empty-state"><div class="big">👈</div><span>請選擇左側群組</span></div>
    </div>
  </div>
  <div id="entry-detail">
    <div class="detail-placeholder"><div class="big">🔑</div><span>選擇一個帳號查看詳情</span></div>
  </div>
</div>

<!-- Edit/Add Modal -->
<div class="modal-overlay hidden" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">新增帳號</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label>標題 *</label>
        <input type="text" id="ef-title" placeholder="例：Gmail">
      </div>
      <div class="modal-field">
        <label>使用者名稱</label>
        <input type="text" id="ef-username" placeholder="例：user@example.com" autocomplete="off">
      </div>
      <div class="modal-field">
        <label>密碼</label>
        <div class="pw-field-row">
          <input type="password" id="ef-password" placeholder="輸入密碼..." autocomplete="new-password">
          <div class="pw-actions">
            <button class="pw-btn" title="顯示/隱藏" onclick="toggleModalPw()">👁</button>
            <button class="pw-btn" title="生成密碼" onclick="generatePassword()">🎲</button>
          </div>
        </div>
        <div class="pw-strength" id="pw-strength-bar"></div>
      </div>
      <div class="modal-field">
        <label>網址</label>
        <input type="text" id="ef-url" placeholder="例：https://mail.google.com">
      </div>
      <div class="modal-field">
        <label>群組</label>
        <select id="ef-group"></select>
      </div>
      <div class="modal-field">
        <label>備註</label>
        <textarea id="ef-notes" placeholder="其他備註..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveEntry()">儲存帳號</button>
    </div>
  </div>
</div>

<!-- Confirm Delete -->
<div class="confirm-overlay hidden" id="confirm-modal">
  <div class="confirm-box">
    <h4>🗑 確認刪除</h4>
    <p id="confirm-msg">確定要刪除這個帳號嗎？此操作無法復原（直到你重新載入原始檔案）。</p>
    <div class="confirm-btns">
      <button class="btn-confirm-cancel" onclick="closeConfirm()">取消</button>
      <button class="btn-confirm-ok" id="confirm-ok-btn">刪除</button>
    </div>
  </div>
</div>

<script>
var kdbxweb = window.kdbxweb;
var db=null,allEntries=[],currentGroupEntries=[],selectedFile=null;
var _editingEntry=null; // null = new, entry object = editing
var _hasUnsavedChanges=false;
var _currentGroup=null; // currently selected group object

var dropZone=document.getElementById("drop-zone");
var fileInput=document.getElementById("file-input");
dropZone.addEventListener("dragover",function(e){e.preventDefault();dropZone.classList.add("drag-over")});
dropZone.addEventListener("dragleave",function(){dropZone.classList.remove("drag-over")});
dropZone.addEventListener("drop",function(e){e.preventDefault();dropZone.classList.remove("drag-over");var f=e.dataTransfer.files[0];if(f&&f.name.endsWith(".kdbx"))setFile(f)});
fileInput.addEventListener("change",function(){if(fileInput.files[0])setFile(fileInput.files[0])});

function setFile(f){selectedFile=f;document.getElementById("filename-display").textContent="📄 "+f.name}

function togglePw(){var i=document.getElementById("master-pw");i.type=i.type==="password"?"text":"password"}

document.getElementById("master-pw").addEventListener("keydown",function(e){if(e.key==="Enter")unlockDB()});

async function unlockDB(){
  var pw=document.getElementById("master-pw").value;
  var errEl=document.getElementById("error-msg");
  var btn=document.getElementById("unlock-btn");
  if(!selectedFile){showError("請先選擇 .kdbx 檔案");return}
  if(!pw){showError("請輸入主密碼");return}
  errEl.style.display="none";
  btn.disabled=true;
  btn.innerHTML='<span class="loading"></span>解密中...';
  try{
    var buf=await selectedFile.arrayBuffer();
    var credentials=new kdbxweb.Credentials(kdbxweb.ProtectedValue.fromString(pw));
    db=await kdbxweb.Kdbx.load(buf,credentials);
    allEntries=[];
    collectEntries(db.getDefaultGroup(),[]);
    document.getElementById("unlock-screen").classList.add("hidden");
    document.getElementById("main-app").classList.remove("hidden");
    buildGroupTree();
    selectGroup(null,"所有帳號");
  }catch(e){
    console.error(e);
    showError("解鎖失敗：密碼錯誤或格式不支援");
    btn.disabled=false;
    btn.innerHTML="解鎖密碼庫";
  }
}

function showError(msg){var el=document.getElementById("error-msg");el.textContent=msg;el.style.display="block"}

function collectEntries(group,path){
  var p=[...path,group.name];
  for(var e of group.entries)allEntries.push({entry:e,group:group.name,groupObj:group,path:p});
  for(var g of group.groups)collectEntries(g,p);
}

function buildGroupTree(){
  var tree=document.getElementById("group-tree");
  tree.innerHTML="";
  tree.appendChild(makeGroupEl("🗂 所有帳號",allEntries.length,null,"所有帳號",0));
  buildGroupChildren(db.getDefaultGroup(),tree,0);
}

function buildGroupChildren(group,container,depth){
  var count=countGroupEntries(group);
  container.appendChild(makeGroupEl(getGroupIcon(group.name)+" "+group.name,count,group,group.name,depth));
  for(var sub of group.groups)buildGroupChildren(sub,container,depth+1);
}

function countGroupEntries(group){
  var n=group.entries.length;
  for(var sub of group.groups)n+=countGroupEntries(sub);
  return n;
}

function makeGroupEl(label,count,group,name,depth){
  var el=document.createElement("div");
  el.className="group-item";
  el.style.paddingLeft=(16+depth*14)+"px";
  el.innerHTML='<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+label+'</span><span class="count">'+count+"</span>";
  el.onclick=function(){
    document.querySelectorAll(".group-item").forEach(function(e){e.classList.remove("active")});
    el.classList.add("active");
    _currentGroup=group;
    selectGroup(group,name);
  };
  return el;
}

function getGroupIcon(n){
  var nl=n.toLowerCase();
  if(nl.includes("email")||nl.includes("mail"))return"📧";
  if(nl.includes("bank")||nl.includes("銀行"))return"🏦";
  if(nl.includes("social")||nl.includes("社群"))return"💬";
  if(nl.includes("work")||nl.includes("工作"))return"💼";
  if(nl.includes("shop")||nl.includes("購物"))return"🛒";
  if(nl.includes("server")||nl.includes("伺服器"))return"🖥";
  return"📂";
}

function selectGroup(group,name){
  document.getElementById("search-input").value="";
  if(group===null){currentGroupEntries=[...allEntries]}
  else{var tmp=[];collectGroupFlat(group,tmp);currentGroupEntries=tmp}
  renderEntryList(currentGroupEntries);
  renderDetailPlaceholder();
}

function collectGroupFlat(group,arr){
  for(var e of group.entries)arr.push({entry:e,group:group.name,groupObj:group});
  for(var sub of group.groups)collectGroupFlat(sub,arr);
}

function renderEntryList(items){
  _renderedItems=items;
  var list=document.getElementById("entry-list");
  if(items.length===0){list.innerHTML='<div class="empty-state"><div class="big">🔍</div><span>無符合結果</span></div>';return}
  list.innerHTML=items.map(function(item,i){
    var e=item.entry;
    var title=getField(e,"Title")||"(無標題)";
    var url=getField(e,"URL")||"";
    var username=getField(e,"UserName")||"";
    return'<div class="entry-item" onclick="showEntry('+i+')" id="entry-item-'+i+'">'+
      '<div class="entry-title"><span class="entry-icon">'+getEntryIcon(url,title)+'</span><span style="overflow:hidden;text-overflow:ellipsis">'+escHtml(title)+"</span></div>"+
      '<div class="entry-url">'+escHtml(username||url||"無使用者名稱")+"</div></div>";
  }).join("");
}

function getEntryIcon(url,title){
  var t=(url+title).toLowerCase();
  if(t.includes("google"))return"🔵";
  if(t.includes("github"))return"⚫";
  if(t.includes("amazon")||t.includes("aws"))return"🟠";
  if(t.includes("microsoft")||t.includes("outlook"))return"🟦";
  if(t.includes("facebook")||t.includes("fb"))return"🔷";
  return"🔑";
}

function filterEntries(q){
  if(!q.trim()){renderEntryList(currentGroupEntries);return}
  var ql=q.toLowerCase();
  var filtered=currentGroupEntries.filter(function(item){
    var title=(getField(item.entry,"Title")||"").toLowerCase();
    var user=(getField(item.entry,"UserName")||"").toLowerCase();
    var url=(getField(item.entry,"URL")||"").toLowerCase();
    return title.includes(ql)||user.includes(ql)||url.includes(ql);
  });
  renderEntryList(filtered);
}

var _renderedItems=[];
var _currentEntryIdx=-1;

function showEntry(idx){
  _currentEntryIdx=idx;
  document.querySelectorAll(".entry-item").forEach(function(e){e.classList.remove("active")});
  var el=document.getElementById("entry-item-"+idx);
  if(el)el.classList.add("active");
  var item=_renderedItems[idx];
  if(!item)return;
  var e=item.entry;
  var title=getField(e,"Title")||"(無標題)";
  var username=getField(e,"UserName")||"";
  var password=getProtectedField(e,"Password")||"";
  var url=getField(e,"URL")||"";
  var notes=getField(e,"Notes")||"";
  var detail=document.getElementById("entry-detail");
  detail.innerHTML=
    '<div class="detail-actions">'+
    '<button class="btn-edit-entry" onclick="openModal('+idx+')">✏️ 編輯</button>'+
    '<button class="btn-delete-entry" onclick="deleteEntryConfirm('+idx+')">🗑 刪除</button>'+
    '</div>'+
    '<div class="detail-title">'+escHtml(title)+'</div>'+
    '<div class="detail-group-tag">📂 '+escHtml(item.group||"")+'</div>'+
    (username?'<div class="field-block"><div class="label">使用者名稱</div><div class="field-value-row"><span class="val">'+escHtml(username)+'</span><button class="btn-icon" onclick="copyText(\''+escQ(username)+'\',\'使用者名稱\')">📋</button></div></div>':"")+
    '<div class="field-block"><div class="label">密碼</div><div class="field-value-row"><span class="val masked" id="pw-val">••••••••••••</span><button class="btn-icon" onclick="togglePwField()" id="pw-toggle-btn">👁</button><button class="btn-icon" onclick="copyText(\''+escQ(password)+'\',\'密碼\')">📋</button></div></div>'+
    (url?'<div class="field-block"><div class="label">網址</div><div class="field-value-row"><span class="val"><a href="'+escHtml(url)+'" target="_blank" rel="noopener noreferrer">'+escHtml(url)+'</a></span><button class="btn-icon" onclick="copyText(\''+escQ(url)+'\',\'網址\')">📋</button></div></div>':"")+
    (notes?'<div class="field-block"><div class="label">備註</div><div class="notes-block">'+escHtml(notes)+"</div></div>":"");
  detail.dataset.pw=password;
  detail.dataset.pwVisible="false";
}

function togglePwField(){
  var detail=document.getElementById("entry-detail");
  var pw=detail.dataset.pw;
  var visible=detail.dataset.pwVisible==="true";
  var el=document.getElementById("pw-val");
  var btn=document.getElementById("pw-toggle-btn");
  if(visible){el.textContent="••••••••••••";el.classList.add("masked");btn.textContent="👁";detail.dataset.pwVisible="false"}
  else{el.textContent=pw;el.classList.remove("masked");btn.textContent="🙈";detail.dataset.pwVisible="true"}
}

function renderDetailPlaceholder(){
  document.getElementById("entry-detail").innerHTML='<div class="detail-placeholder"><div class="big">🔑</div><span>選擇一個帳號查看詳情</span></div>';
}

function getField(entry,key){
  var f=entry.fields.get(key);
  if(!f)return"";
  if(f&&typeof f==="object"&&f.getText)return f.getText();
  return f||"";
}

function getProtectedField(entry,key){
  var f=entry.fields.get(key);
  if(!f)return"";
  if(f&&typeof f==="object"&&f.getText)return f.getText();
  return f||"";
}

function copyText(text,label){
  navigator.clipboard.writeText(text).then(function(){
    var t=document.getElementById("copy-toast");
    t.textContent="✅ "+label+" 已複製！";
    t.classList.add("show");
    setTimeout(function(){t.classList.remove("show")},2000);
  });
}

function escHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function escQ(s){return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,'\\"')}

function lockDB(){
  db=null;allEntries=[];currentGroupEntries=[];selectedFile=null;_hasUnsavedChanges=false;_currentGroup=null;
  document.getElementById("master-pw").value="";
  document.getElementById("filename-display").textContent="";
  document.getElementById("error-msg").style.display="none";
  document.getElementById("unlock-btn").disabled=false;
  document.getElementById("unlock-btn").textContent="解鎖密碼庫";
  document.getElementById("main-app").classList.add("hidden");
  document.getElementById("unlock-screen").classList.remove("hidden");
}

// ===== NEW: Modal functions =====

function openModal(entryIdx){
  var modal=document.getElementById("edit-modal");
  var title=document.getElementById("modal-title");

  // Populate group dropdown
  var groupSel=document.getElementById("ef-group");
  groupSel.innerHTML="";
  var groupList=[];
  collectGroupsFlat(db.getDefaultGroup(),groupList);
  groupList.forEach(function(g){
    var opt=document.createElement("option");
    opt.value=g.uuid.id;
    opt.textContent=g.name;
    opt.dataset.group=JSON.stringify({id:g.uuid.id});
    groupSel.appendChild(opt);
  });

  if(entryIdx===null){
    // New entry
    _editingEntry=null;
    title.textContent="新增帳號";
    document.getElementById("ef-title").value="";
    document.getElementById("ef-username").value="";
    document.getElementById("ef-password").value="";
    document.getElementById("ef-url").value="";
    document.getElementById("ef-notes").value="";
    document.getElementById("pw-strength-bar").style.background="";
    // Pre-select current group if one is selected
    if(_currentGroup){
      for(var i=0;i<groupSel.options.length;i++){
        if(groupSel.options[i].value===_currentGroup.uuid.id){groupSel.selectedIndex=i;break}
      }
    }
  } else {
    // Edit existing
    var item=_renderedItems[entryIdx];
    var e=item.entry;
    _editingEntry=e;
    title.textContent="編輯帳號";
    document.getElementById("ef-title").value=getField(e,"Title");
    document.getElementById("ef-username").value=getField(e,"UserName");
    document.getElementById("ef-password").value=getProtectedField(e,"Password");
    document.getElementById("ef-url").value=getField(e,"URL");
    document.getElementById("ef-notes").value=getField(e,"Notes");
    updatePwStrength(document.getElementById("ef-password").value);
    // Select current group
    for(var i=0;i<groupSel.options.length;i++){
      if(groupSel.options[i].value===item.groupObj.uuid.id){groupSel.selectedIndex=i;break}
    }
  }

  modal.classList.remove("hidden");
  setTimeout(function(){document.getElementById("ef-title").focus()},50);
}

function collectGroupsFlat(group,arr){
  arr.push(group);
  for(var sub of group.groups)collectGroupsFlat(sub,arr);
}

function closeModal(){
  document.getElementById("edit-modal").classList.add("hidden");
  _editingEntry=null;
}

function toggleModalPw(){
  var inp=document.getElementById("ef-password");
  inp.type=inp.type==="password"?"text":"password";
}

function updatePwStrength(pw){
  var bar=document.getElementById("pw-strength-bar");
  if(!pw){bar.style.background="";bar.style.width="0";return}
  var score=0;
  if(pw.length>=8)score++;
  if(pw.length>=14)score++;
  if(/[A-Z]/.test(pw))score++;
  if(/[0-9]/.test(pw))score++;
  if(/[^A-Za-z0-9]/.test(pw))score++;
  var colors=["","#ff5f57","#f5a623","#3dd68c","#3dd68c"];
  var widths=["0","25%","50%","75%","100%"];
  bar.style.background=colors[score]||"";
  bar.style.width=widths[score]||"0";
}

document.getElementById("ef-password").addEventListener("input",function(){updatePwStrength(this.value)});

function generatePassword(){
  var chars="ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$%^&*";
  var length=20;
  var arr=new Uint8Array(length);
  window.crypto.getRandomValues(arr);
  var pw="";
  for(var i=0;i<length;i++)pw+=chars[arr[i]%chars.length];
  var inp=document.getElementById("ef-password");
  inp.value=pw;
  inp.type="text";
  updatePwStrength(pw);
  copyText(pw,"新密碼");
}

function saveEntry(){
  var titleVal=document.getElementById("ef-title").value.trim();
  if(!titleVal){
    alert("標題不能為空");
    document.getElementById("ef-title").focus();
    return;
  }
  var usernameVal=document.getElementById("ef-username").value;
  var passwordVal=document.getElementById("ef-password").value;
  var urlVal=document.getElementById("ef-url").value;
  var notesVal=document.getElementById("ef-notes").value;

  // Find target group
  var groupSel=document.getElementById("ef-group");
  var selectedGroupId=groupSel.value;
  var targetGroup=findGroupById(db.getDefaultGroup(),selectedGroupId);
  if(!targetGroup)targetGroup=db.getDefaultGroup();

  if(_editingEntry){
    // Edit existing entry
    _editingEntry.fields.set("Title",titleVal);
    _editingEntry.fields.set("UserName",usernameVal);
    _editingEntry.fields.set("Password",kdbxweb.ProtectedValue.fromString(passwordVal));
    _editingEntry.fields.set("URL",urlVal);
    _editingEntry.fields.set("Notes",notesVal);
    _editingEntry.times.lastModTime=new Date();
  } else {
    // Create new entry
    var entry=db.createEntry(targetGroup);
    entry.fields.set("Title",titleVal);
    entry.fields.set("UserName",usernameVal);
    entry.fields.set("Password",kdbxweb.ProtectedValue.fromString(passwordVal));
    entry.fields.set("URL",urlVal);
    entry.fields.set("Notes",notesVal);
  }

  closeModal();
  markUnsaved();
  refreshAll();
  showToast("✅ 帳號已儲存（記得點 💾 儲存 .kdbx）");
}

function findGroupById(group,id){
  if(group.uuid.id===id)return group;
  for(var sub of group.groups){
    var found=findGroupById(sub,id);
    if(found)return found;
  }
  return null;
}

// ===== NEW: Delete entry =====

var _pendingDeleteIdx=-1;

function deleteEntryConfirm(entryIdx){
  _pendingDeleteIdx=entryIdx;
  var item=_renderedItems[entryIdx];
  var title=getField(item.entry,"Title")||"(無標題)";
  document.getElementById("confirm-msg").textContent='確定要刪除「'+title+'」嗎？此操作無法復原（除非重新載入原始檔案）。';
  document.getElementById("confirm-modal").classList.remove("hidden");
  document.getElementById("confirm-ok-btn").onclick=function(){
    doDeleteEntry(_pendingDeleteIdx);
    closeConfirm();
  };
}

function closeConfirm(){
  document.getElementById("confirm-modal").classList.add("hidden");
  _pendingDeleteIdx=-1;
}

function doDeleteEntry(entryIdx){
  var item=_renderedItems[entryIdx];
  if(!item)return;
  db.remove(item.entry);
  markUnsaved();
  refreshAll();
  renderDetailPlaceholder();
  showToast("🗑 已刪除（記得點 💾 儲存）");
}

// ===== NEW: Save DB to file =====

async function saveDB(){
  if(!db)return;
  var btn=document.getElementById("save-db-btn");
  btn.disabled=true;
  btn.textContent="儲存中...";
  try{
    var buf=await db.save();
    var blob=new Blob([buf],{type:"application/octet-stream"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    var fname=selectedFile?selectedFile.name:"passwords.kdbx";
    a.href=url;
    a.download=fname;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    _hasUnsavedChanges=false;
    btn.textContent="💾 儲存";
    showToast("✅ .kdbx 已下載！請用它覆蓋原檔案");
  }catch(e){
    console.error(e);
    alert("儲存失敗："+e.message);
    btn.textContent="💾 儲存";
    btn.disabled=false;
  }
}

// ===== Helpers =====

function markUnsaved(){
  _hasUnsavedChanges=true;
  var btn=document.getElementById("save-db-btn");
  btn.disabled=false;
  btn.textContent="💾 儲存 ●";
}

function refreshAll(){
  allEntries=[];
  collectEntries(db.getDefaultGroup(),[]);
  buildGroupTree();
  // Re-select current group
  if(_currentGroup){
    var tmp=[];
    collectGroupFlat(_currentGroup,tmp);
    currentGroupEntries=tmp;
    renderEntryList(tmp);
  } else {
    currentGroupEntries=[...allEntries];
    renderEntryList(allEntries);
  }
}

function showToast(msg){
  var t=document.getElementById("copy-toast");
  t.textContent=msg;
  t.classList.add("show");
  setTimeout(function(){t.classList.remove("show")},2500);
}

// Close modals on overlay click
document.getElementById("edit-modal").addEventListener("click",function(e){
  if(e.target===this)closeModal();
});
document.getElementById("confirm-modal").addEventListener("click",function(e){
  if(e.target===this)closeConfirm();
});

// Warn before leaving if unsaved
window.addEventListener("beforeunload",function(e){
  if(_hasUnsavedChanges){e.preventDefault();e.returnValue=""}
});
</script>
